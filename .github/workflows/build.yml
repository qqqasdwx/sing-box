name: Build AetherCloud gateway

on:
  workflow_dispatch:
  push:
    branches:
      - aethercloud

permissions:
  contents: read
  packages: write

concurrency:
  group: aethercloud-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Verify scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          bash -n aethercloud-agent.sh aethercloud-v6 healthcheck.sh install.sh uninstall.sh
          shellcheck aethercloud-agent.sh aethercloud-v6 healthcheck.sh install.sh uninstall.sh
          python3 -m py_compile tests/socks5_udp_dns.py tests/socks5_udp_ntp.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:aethercloud
            ghcr.io/${{ github.repository }}:aethercloud-${{ github.sha }}
