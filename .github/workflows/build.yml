name: Publish release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tools/**"
      - "sing-box.sh"
      - "docker_init.sh"
      - "Dockerfile"
      - "README.md"
      - "CHANGELOG.md"
      - "BEHAVIOR_DIFFS.md"
      - "LICENSE"
      - "config.conf"
      - "force_version"
      - "examples/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish scripts and image
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository }}:latest
      GHCR_SHA_IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
      RELEASE_DIR: /tmp/sing-box-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Verify bundled scripts
        run: |
          chmod +x tools/bundle.sh tools/prepare-release.sh
          tools/bundle.sh --check

      - name: Check shell syntax
        run: bash -n sing-box.sh docker_init.sh tools/bundle.sh tools/prepare-release.sh

      - name: Check routing examples
        run: find examples/routing -type f -name '*.json' -print0 | xargs -0 -r -n1 jq empty

      - name: Prepare release tree
        run: tools/prepare-release.sh "$RELEASE_DIR"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ env.RELEASE_DIR }}
          push: true
          platforms: linux/amd64, linux/arm64, linux/arm/v7
          tags: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.GHCR_SHA_IMAGE }}

      - name: Publish release branch
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags origin release || true
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git switch -C release-publish refs/remotes/origin/release
          else
            git switch --orphan release-publish
          fi

          git rm -r --ignore-unmatch .
          cp -a "$RELEASE_DIR/." .
          git add -A

          if git diff --cached --quiet; then
            echo "Release branch is already up to date."
            exit 0
          fi

          git commit -m "chore: publish release artifacts"
          git push origin HEAD:release --force-with-lease
