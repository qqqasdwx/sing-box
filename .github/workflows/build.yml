name: Build AetherCloud gateway

on:
  workflow_dispatch:
  push:
    branches:
      - aethercloud

permissions:
  contents: read
  packages: write

concurrency:
  group: aethercloud-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Verify scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          bash -n aethercloud-agent.sh healthcheck.sh install.sh uninstall.sh
          shellcheck aethercloud-agent.sh healthcheck.sh install.sh uninstall.sh
          bash tests/slot_mapping.sh
          python3 -m py_compile tests/socks5_udp_dns.py tests/socks5_udp_ntp.py
          find examples/sing-box -type f -name '*.json' -print0 | xargs -0 -r -n1 jq empty
          docker compose --env-file aethercloud-v6.env.example -f compose.yml config >/dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/aethercloud-v6:latest
            ghcr.io/${{ github.repository_owner }}/aethercloud-v6:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=AetherCloud DynamicV6 gateway
