name: Bundle check

on:
  pull_request:
    paths:
      - "src/**"
      - "tools/bundle.sh"
      - "sing-box.sh"
      - "docker_init.sh"
      - ".github/workflows/bundle.yml"
  push:
    branches:
      - modular
      - release
    paths:
      - "src/**"
      - "tools/bundle.sh"
      - "sing-box.sh"
      - "docker_init.sh"
      - ".github/workflows/bundle.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Verify bundled scripts
        run: |
          chmod +x tools/bundle.sh
          tools/bundle.sh --check

      - name: Check shell syntax
        run: bash -n sing-box.sh docker_init.sh
