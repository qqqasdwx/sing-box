name: Upstream watch

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: fscarmen/sing-box
      UPSTREAM_BRANCH: main
      TRACKING_BRANCH: upstream-main
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check upstream branch
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"

          git fetch --no-tags upstream "refs/heads/${UPSTREAM_BRANCH}:refs/remotes/upstream/${UPSTREAM_BRANCH}"
          upstream_sha="$(git rev-parse "refs/remotes/upstream/${UPSTREAM_BRANCH}")"
          upstream_short="${upstream_sha:0:7}"

          tracked_sha=""
          if git fetch --no-tags origin "refs/heads/${TRACKING_BRANCH}:refs/remotes/origin/${TRACKING_BRANCH}"; then
            tracked_sha="$(git rev-parse "refs/remotes/origin/${TRACKING_BRANCH}")"
          fi

          if [ -n "$tracked_sha" ] && [ "$tracked_sha" = "$upstream_sha" ]; then
            echo "No upstream update. ${UPSTREAM_REPO}@${upstream_short} is already tracked by ${TRACKING_BRANCH}."
            exit 0
          fi

          title="Upstream update available: ${UPSTREAM_REPO}@${upstream_short}"
          existing_issue="$(
            gh issue list --state open --limit 100 --json number,title |
              jq -r --arg title "$title" '.[] | select(.title == $title) | .number' |
              sed -n '1p'
          )"

          if [ -n "$existing_issue" ]; then
            echo "Issue #${existing_issue} already exists for ${upstream_sha}."
            exit 0
          fi

          body="$(mktemp)"
          {
            echo "A new upstream commit is available."
            echo
            echo "- Upstream: https://github.com/${UPSTREAM_REPO}"
            echo "- Branch: \`${UPSTREAM_BRANCH}\`"
            echo "- New upstream commit: \`${upstream_sha}\`"
            if [ -n "$tracked_sha" ]; then
              echo "- Currently tracked commit: \`${tracked_sha}\`"
              echo "- Compare: https://github.com/${UPSTREAM_REPO}/compare/${tracked_sha}...${upstream_sha}"
            else
              echo "- Currently tracked commit: none; \`${TRACKING_BRANCH}\` was not found."
            fi
            echo
            echo "Suggested handling:"
            echo
            echo "1. Review upstream changes."
            echo "2. Port useful changes into \`main\`."
            echo "3. After review, update \`${TRACKING_BRANCH}\` to the upstream commit."
          } > "$body"

          gh issue create --title "$title" --body-file "$body"
