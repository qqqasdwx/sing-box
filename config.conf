# 使用说明 / Usage:
# 1. 复制此文件并重命名为 config.conf
#    Copy this file and rename it to config.conf
# 2. 取消注释需要修改的变量，并填写对应值
#    Uncomment only the variables you want to set
# 3. 执行安装或更新命令 / Run install or update:
#    bash <(wget -qO- https://raw.githubusercontent.com/qqqasdwx/sing-box/release/sing-box.sh) -f config.conf

# 说明 / Notes:
# - 默认只保留必须显式选择的协议选择模式，其余变量全部注释。
#   Only the required protocol-selection mode is active by default; all other fields are commented.
# - 安装或更新成功后，脚本会备份并回写实际值，把此文件变成可复用状态文件。
#   After a successful install/update, the script backs this file up and writes actual values back.
# - 回写不会保留原文件排版或注释，也不会修改文件权限；其中会包含敏感值，请自行保护权限。
#   Write-back does not preserve custom formatting/comments and does not change file permissions. Protect the sensitive values yourself.
# - CHOOSE_PROTOCOLS='switch' 时，必须至少启用一个单协议开关。
#   With CHOOSE_PROTOCOLS='switch', enable at least one per-protocol switch.
# - 布尔值支持 true/1/y/yes/on；未填写或注释表示 false，除非注释里另有默认值说明。
#   Boolean true values: true/1/y/yes/on. Commented or empty means false unless documented otherwise.


# 全局选择 / Global Selection

# 必填：默认按单协议开关选择协议，避免误装全部协议。
# Required. switch = select protocols from the per-protocol switches below.
# 高级用法：也可改成 a 或 b-m 组合，例如 bcf；a 表示全部协议。
# Advanced: use a or any b-m combination, e.g. bcf. a means all protocols.
CHOOSE_PROTOCOLS='switch'


# 全局基础项 / Global Basics

# LANGUAGE='c'              # 可选：c=中文，e=英文；默认 c / Optional. Default: c.
# START_PORT='8881'         # 可选：第一个默认协议端口；默认 8881 / Optional. First default protocol port. Default: 8881.
# LOG_LEVEL='error'         # 可选：trace/debug/info/warn/error/fatal/panic；默认 error / Optional. Default: error.
# NTP_ENABLED='true'        # 可选：sing-box 内建 NTP；默认 true / Optional. Default: true.
# NTP_SERVER='time.apple.com' # 可选：NTP 服务器；默认 time.apple.com / Optional. Default: time.apple.com.
# NTP_SERVER_PORT='123'     # 可选：NTP 端口；默认 123 / Optional. Default: 123.
# NTP_INTERVAL='60m'        # 可选：同步间隔，如 30m/60m/1h；默认 60m / Optional. Default: 60m.
# PORT_NGINX=''             # 可选：订阅/Argo 的 nginx 端口；启用订阅或 Argo 时默认自动选择 / Optional. Auto-pick when subscription or Argo is enabled.
# SERVER_IP=''              # 可选：公网 IPv4/IPv6；默认自动检测，优先 IPv4 / Optional. Auto-detect public IP, preferring IPv4.
# TLS_SERVER='addons.mozilla.org' # 可选：Reality/自签证书 SNI；默认 addons.mozilla.org / Optional. Default: addons.mozilla.org.
# NODE_NAME_CONFIRM=''      # 可选：全局节点名；默认 国家/地区 emoji + hostname / Optional. Default: country/region emoji + hostname.


# 全局身份凭据 / Global Identity

# UUID_CONFIRM=''           # 建议固定：全局 UUID；默认随机生成 / Recommended fixed value. Default: random UUID.


# 输出模式、Argo 与 WebSocket 共用项 / Output, Argo, and WebSocket Common

# SUBSCRIBE='false'         # 可选：启用订阅；默认 false / Optional. Enable subscription. Default: false.
# ARGO='false'              # 可选：启用 Argo Tunnel；默认 false / Optional. Enable Argo Tunnel. Default: false.
# ARGO_DOMAIN=''            # 条件必填：ARGO=true 且使用固定隧道时填写；留空使用临时隧道 / Required for fixed Argo tunnel. Empty uses Quick Tunnel.
# ARGO_AUTH=''              # 条件必填：填写 ARGO_DOMAIN 时必填；支持 Json、Tunnel Token、Cloudflare API Token / Required when ARGO_DOMAIN is set.
# CDN='skk.moe'             # 可选：WS 客户端连接域名；默认 skk.moe / Optional. WS client server. Default: skk.moe.
# CDN_PORT=''               # 可选：WS 客户端连接端口；默认 VMess WS=80，VLESS WS TLS=443 / Optional. Defaults: VMess WS 80, VLESS WS TLS 443.


# Reality 共享项 / Reality Shared Settings (b/j/k)

# REALITY_PRIVATE=''        # 建议固定：Reality 私钥；默认随机生成，b/j/k 共用 / Recommended fixed value. Default: random, shared by b/j/k.


# b. VLESS Reality

# XTLS_REALITY='true'       # 启用 b 协议；CHOOSE_PROTOCOLS=switch 时至少启用一个协议 / Enable protocol b.
# PORT_XTLS_REALITY=''      # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_XTLS_REALITY='' # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.


# c. Hysteria2

# HYSTERIA2='true'          # 启用 c 协议 / Enable protocol c.
# PORT_HYSTERIA2=''         # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_HYSTERIA2=''    # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
# HY2_PORT_HOPPING_RANGE='' # 可选：端口跳跃范围，格式 start:end；默认禁用 / Optional. Port hopping range. Default: disabled.
# HY2_REALM='false'         # 可选：启用 Hysteria2 Realm；默认 false / Optional. Default: false.
# REALM='false'             # 可选：HY2_REALM 的旧别名；默认 false / Optional. Legacy alias for HY2_REALM. Default: false.
# HY2_WARP='false'          # 可选：启用 WARP 辅助 Realm，并隐含 HY2_REALM=true；默认 false / Optional. Default: false.
# REALM_WARP='false'        # 可选：HY2_WARP 的旧别名；默认 false / Optional. Legacy alias for HY2_WARP. Default: false.
# WARP_REALM='false'        # 可选：HY2_WARP 的旧别名；默认 false / Optional. Legacy alias for HY2_WARP. Default: false.
# HY2_REALM_ID=''           # 可选：Realm ID；默认 Hysteria2 的 UUID / Optional. Default: Hysteria2 UUID.
# HY2_UP='200'              # 可选：导出的客户端上行 Mbps；默认 200 / Optional. Client export up Mbps. Default: 200.
# HY2_DOWN='1000'           # 可选：导出的客户端下行 Mbps；默认 1000 / Optional. Client export down Mbps. Default: 1000.


# d. Tuic V5

# TUIC='true'               # 启用 d 协议 / Enable protocol d.
# PORT_TUIC=''              # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_TUIC=''         # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
# TUIC_PASSWORD=''          # 可选：Tuic 密码；默认 UUID_CONFIRM / Optional. Default: UUID_CONFIRM.
# TUIC_CONGESTION_CONTROL='bbr' # 可选：拥塞控制；默认 bbr / Optional. Default: bbr.


# e. ShadowTLS

# SHADOWTLS='true'          # 启用 e 协议 / Enable protocol e.
# PORT_SHADOWTLS=''         # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_SHADOWTLS=''    # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
# SHADOWTLS_PASSWORD=''     # 建议固定：底层 Shadowsocks 密码；默认随机生成 / Recommended fixed value. Default: random.
# SHADOWTLS_METHOD='2022-blake3-aes-128-gcm' # 可选：底层 Shadowsocks 加密方法；默认 2022-blake3-aes-128-gcm / Optional. Default shown.


# f. Shadowsocks

# SHADOWSOCKS='true'        # 启用 f 协议 / Enable protocol f.
# PORT_SHADOWSOCKS=''       # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_SHADOWSOCKS=''  # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
# SHADOWSOCKS_PASSWORD=''   # 建议固定：密码；默认随机生成 / Recommended fixed value. Default: random.
# SHADOWSOCKS_METHOD='2022-blake3-aes-128-gcm' # 可选：加密方法；默认 2022-blake3-aes-128-gcm / Optional. Default shown.


# g. Trojan

# TROJAN='true'             # 启用 g 协议 / Enable protocol g.
# PORT_TROJAN=''            # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_TROJAN=''       # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
# TROJAN_PASSWORD=''        # 可选：Trojan 密码；默认 UUID_CONFIRM / Optional. Default: UUID_CONFIRM.


# h. VMess WebSocket

# VMESS_WS='true'           # 启用 h 协议 / Enable protocol h.
# PORT_VMESS_WS=''          # 可选：源站监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Origin listen port. Default: START_PORT + protocol position.
# NODE_NAME_VMESS_WS=''     # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
# VMESS_HOST_DOMAIN=''      # 条件必填：选择 h 且 ARGO=false 时必填 / Required when h is enabled and ARGO=false.
# VMESS_WS_PATH=''          # 可选：WS 路径；默认 <VMess UUID>-vmess / Optional. Default: <VMess UUID>-vmess.


# i. VLESS WebSocket TLS

# VLESS_WS='true'           # 启用 i 协议 / Enable protocol i.
# PORT_VLESS_WS=''          # 可选：源站监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Origin listen port. Default: START_PORT + protocol position.
# NODE_NAME_VLESS_WS=''     # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
# VLESS_HOST_DOMAIN=''      # 条件必填：选择 i 且 ARGO=false 时必填 / Required when i is enabled and ARGO=false.
# VLESS_WS_PATH=''          # 可选：WS 路径；默认 <VLESS UUID>-vless / Optional. Default: <VLESS UUID>-vless.


# j. H2 Reality

# H2_REALITY='true'         # 启用 j 协议 / Enable protocol j.
# PORT_H2_REALITY=''        # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_H2_REALITY=''   # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.


# k. gRPC Reality

# GRPC_REALITY='true'       # 启用 k 协议 / Enable protocol k.
# PORT_GRPC_REALITY=''      # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_GRPC_REALITY='' # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.


# l. AnyTLS

# ANYTLS='true'             # 启用 l 协议 / Enable protocol l.
# PORT_ANYTLS=''            # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_ANYTLS=''       # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.


# m. NaiveProxy

# NAIVE='true'              # 启用 m 协议 / Enable protocol m.
# PORT_NAIVE=''             # 可选：监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Optional. Default: START_PORT + protocol position.
# NODE_NAME_NAIVE=''        # 可选：节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Optional. Falls back to NODE_NAME_CONFIRM, then hostname.
