# ==============================================================================
# 使用说明 / Usage
# ==============================================================================

# 复制此文件并重命名为 config.conf。
# Copy this file and rename it to config.conf.
#
# 取消注释需要修改的变量行，并填写对应值。
# Uncomment the variable lines you want to set.
#
# 执行安装或更新命令 / Run install or update:
# bash <(wget -qO- https://raw.githubusercontent.com/qqqasdwx/sing-box/release/sing-box.sh) -f config.conf

# 说明 / Notes:
# 默认只启用必须显式选择的协议选择模式，其余变量全部注释。
# Only the required protocol-selection mode is active by default; all other fields are commented.
#
# 安装或更新成功后，脚本会备份此文件，并只取消注释 / 补齐实际生效或需要复用的值。
# After a successful install/update, the script backs this file up and only uncomments/fills active or reusable values.
#
# 未启用、当前模式下不生效的配置会保持注释状态；回写不会修改文件权限。
# Disabled or ineffective options stay commented. Write-back does not change file permissions.
#
# 回写后的文件可能包含 UUID、Reality 私钥、协议密码、Argo 认证等敏感值，请自行保护权限。
# The written file may contain UUIDs, Reality private keys, protocol passwords, Argo credentials, and other secrets.
#
# CHOOSE_PROTOCOLS 为 switch 时，必须至少启用一个单协议开关。
# With CHOOSE_PROTOCOLS set to switch, enable at least one per-protocol switch.
#
# 布尔值支持 true/1/y/yes/on；未填写或注释表示 false，除非注释里另有默认值说明。
# Boolean true values: true/1/y/yes/on. Commented or empty means false unless documented otherwise.


# ==============================================================================
# 全局选择 / Global Selection
# ==============================================================================

# 默认按单协议开关选择协议，避免误装全部协议。
# switch = select protocols from the per-protocol switches below.
#
# 高级用法：也可改成 a 或 b-m 组合，例如 bcf；a 表示全部协议。
# Advanced: use a or any b-m combination, e.g. bcf. a means all protocols.
CHOOSE_PROTOCOLS='switch'


# ==============================================================================
# 全局基础项 / Global Basics
# ==============================================================================

# 语言：c=中文，e=英文；默认 c / Language. Default: c.
#LANGUAGE='c'

# 第一个默认协议端口；默认 8881 / First default protocol port. Default: 8881.
#START_PORT='8881'

# 日志等级：trace/debug/info/warn/error/fatal/panic；默认 error / Log level. Default: error.
#LOG_LEVEL='error'

# sing-box 内建 NTP；默认 true / Built-in NTP. Default: true.
#NTP_ENABLED='true'

# NTP 服务器；默认 time.apple.com / NTP server. Default: time.apple.com.
#NTP_SERVER='time.apple.com'

# NTP 端口；默认 123 / NTP port. Default: 123.
#NTP_SERVER_PORT='123'

# 同步间隔，如 30m/60m/1h；默认 60m / Sync interval. Default: 60m.
#NTP_INTERVAL='60m'

# 订阅 / Argo 的 nginx 端口；启用订阅或 Argo 时默认自动选择。
# nginx port for subscription or Argo. Auto-pick when subscription or Argo is enabled.
#PORT_NGINX=''

# 公网 IPv4/IPv6；默认自动检测，优先 IPv4 / Public IP. Auto-detect, preferring IPv4.
#SERVER_IP=''

# Reality / 自签证书 SNI；默认 addons.mozilla.org / Reality or self-signed certificate SNI. Default: addons.mozilla.org.
#TLS_SERVER='addons.mozilla.org'

# 全局节点名；默认 国家/地区 emoji + hostname / Global node name. Default: country/region emoji + hostname.
#NODE_NAME_CONFIRM=''


# ==============================================================================
# 全局身份凭据 / Global Identity
# ==============================================================================

# 建议固定：全局 UUID；默认随机生成 / Recommended fixed value. Default: random UUID.
#UUID_CONFIRM=''


# ==============================================================================
# 输出模式、Argo 与 WebSocket / Output, Argo, and WebSocket
# ==============================================================================

# 启用 Argo 时，脚本启动一条全局 Argo Tunnel，回源到 PORT_NGINX；
# 订阅和 VMess/VLESS WebSocket 会复用 ARGO_DOMAIN 作为 Host/SNI。
# When Argo is enabled, one global tunnel points to PORT_NGINX; subscription and WebSocket nodes reuse ARGO_DOMAIN.
#
# 使用 Cloudflare API Token 时，脚本可创建或复用 Tunnel，并配置 ingress 和 DNS CNAME。
# With a Cloudflare API Token, the script can create/reuse the tunnel, ingress, and DNS CNAME.
#
# 使用 Tunnel Json 或 Tunnel Token 时，脚本只运行已有 Tunnel；
# 请先在 Cloudflare 绑定 ARGO_DOMAIN，并把 Public Hostname / ingress 回源到 http://localhost:PORT_NGINX。
# With Tunnel Json or Tunnel Token, configure the Cloudflare tunnel hostname yourself before running this script.
#
# 未启用 Argo 时，VMess/VLESS WebSocket 需要通过 Cloudflare DNS/代理和 Origin Rules，
# 或用户自管反代，回源到 PORT_VMESS_WS / PORT_VLESS_WS。客户端连接域名仍由 CDN / CDN_PORT 控制。
# Without Argo, WebSocket domains must be routed by Cloudflare Origin Rules or your own reverse proxy.
#
# VLESS Reality、H2 Reality、gRPC Reality 不使用 VMESS_HOST_DOMAIN / VLESS_HOST_DOMAIN。
# VLESS Reality, H2 Reality, and gRPC Reality do not use VMESS_HOST_DOMAIN or VLESS_HOST_DOMAIN.

# 启用订阅；默认 false / Enable subscription. Default: false.
#SUBSCRIBE='false'

# 启用全局 Argo Tunnel；默认 false / Enable global Argo Tunnel. Default: false.
#ARGO='false'

# 固定 Argo 隧道域名；留空且 ARGO_AUTH 为空时使用 Quick Tunnel。
# Fixed Argo hostname. Empty with no ARGO_AUTH uses Quick Tunnel.
#ARGO_DOMAIN=''

# 固定 Argo 凭据；API Token 可创建/复用隧道，Tunnel Json/Token 只运行已有隧道；回写保留你填入的凭据类型。
# Argo credential. API Token creates/reuses; Tunnel Json/Token runs an existing tunnel. Write-back preserves the type you entered.
#ARGO_AUTH=''

# WebSocket 客户端连接域名；默认 skk.moe / WebSocket client server. Default: skk.moe.
#CDN='skk.moe'

# WebSocket 客户端连接端口；默认 VMess WS=80，VLESS WS TLS=443。
# WebSocket client port. Defaults: VMess WS 80, VLESS WS TLS 443.
#CDN_PORT=''


# ==============================================================================
# Reality 共享项 / Reality Shared Settings
# ==============================================================================

# 建议固定：Reality 私钥；默认随机生成，b/j/k 共用。
# Recommended fixed value. Default: random, shared by b/j/k.
#REALITY_PRIVATE=''


# ==============================================================================
# b. VLESS Reality
# ==============================================================================

# 启用 b 协议；CHOOSE_PROTOCOLS 为 switch 时至少启用一个协议 / Enable protocol b.
#XTLS_REALITY='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_XTLS_REALITY=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_XTLS_REALITY=''


# ==============================================================================
# c. Hysteria2
# ==============================================================================

# 启用 c 协议 / Enable protocol c.
#HYSTERIA2='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_HYSTERIA2=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_HYSTERIA2=''

# 端口跳跃范围，格式 start:end；默认禁用 / Port hopping range. Default: disabled.
#HY2_PORT_HOPPING_RANGE=''

# 启用 Hysteria2 Realm；默认 false / Enable Hysteria2 Realm. Default: false.
#HY2_REALM='false'

# HY2_REALM 的旧别名；默认 false / Legacy alias for HY2_REALM. Default: false.
#REALM='false'

# 启用 WARP 辅助 Realm，并隐含 HY2_REALM；默认 false / Enable WARP-assisted Realm. Default: false.
#HY2_WARP='false'

# HY2_WARP 的旧别名；默认 false / Legacy alias for HY2_WARP. Default: false.
#REALM_WARP='false'

# HY2_WARP 的旧别名；默认 false / Legacy alias for HY2_WARP. Default: false.
#WARP_REALM='false'

# Realm ID；默认 Hysteria2 的 UUID / Realm ID. Default: Hysteria2 UUID.
#HY2_REALM_ID=''

# 导出的客户端上行 Mbps；默认 200 / Client export up Mbps. Default: 200.
#HY2_UP='200'

# 导出的客户端下行 Mbps；默认 1000 / Client export down Mbps. Default: 1000.
#HY2_DOWN='1000'


# ==============================================================================
# d. Tuic V5
# ==============================================================================

# 启用 d 协议 / Enable protocol d.
#TUIC='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_TUIC=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_TUIC=''

# Tuic 密码；默认 UUID_CONFIRM / Tuic password. Default: UUID_CONFIRM.
#TUIC_PASSWORD=''

# 拥塞控制；默认 bbr / Congestion control. Default: bbr.
#TUIC_CONGESTION_CONTROL='bbr'


# ==============================================================================
# e. ShadowTLS
# ==============================================================================

# 启用 e 协议 / Enable protocol e.
#SHADOWTLS='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_SHADOWTLS=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_SHADOWTLS=''

# 建议固定：底层 Shadowsocks 密码；默认随机生成 / Recommended fixed value. Default: random.
#SHADOWTLS_PASSWORD=''

# 底层 Shadowsocks 加密方法；默认 2022-blake3-aes-128-gcm / Shadowsocks method. Default shown.
#SHADOWTLS_METHOD='2022-blake3-aes-128-gcm'


# ==============================================================================
# f. Shadowsocks
# ==============================================================================

# 启用 f 协议 / Enable protocol f.
#SHADOWSOCKS='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_SHADOWSOCKS=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_SHADOWSOCKS=''

# 建议固定：密码；默认随机生成 / Recommended fixed value. Default: random.
#SHADOWSOCKS_PASSWORD=''

# 加密方法；默认 2022-blake3-aes-128-gcm / Method. Default shown.
#SHADOWSOCKS_METHOD='2022-blake3-aes-128-gcm'


# ==============================================================================
# g. Trojan
# ==============================================================================

# 启用 g 协议 / Enable protocol g.
#TROJAN='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_TROJAN=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_TROJAN=''

# Trojan 密码；默认 UUID_CONFIRM / Trojan password. Default: UUID_CONFIRM.
#TROJAN_PASSWORD=''


# ==============================================================================
# h. VMess WebSocket
# ==============================================================================

# 启用 h 协议 / Enable protocol h.
#VMESS_WS='true'

# 源站监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Origin listen port. Default: START_PORT + protocol position.
#PORT_VMESS_WS=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_VMESS_WS=''

# 未启用 Argo 且启用 h 协议时必填：Cloudflare WS Host。
# DNS 指向 SERVER_IP 并开启代理，Origin Rules 回源到 PORT_VMESS_WS。
# Required when protocol h is enabled without Argo.
#VMESS_HOST_DOMAIN=''

# WebSocket 路径；默认 <VMess UUID>-vmess / WebSocket path. Default: <VMess UUID>-vmess.
#VMESS_WS_PATH=''


# ==============================================================================
# i. VLESS WebSocket TLS
# ==============================================================================

# 启用 i 协议 / Enable protocol i.
#VLESS_WS='true'

# 源站监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Origin listen port. Default: START_PORT + protocol position.
#PORT_VLESS_WS=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_VLESS_WS=''

# 未启用 Argo 且启用 i 协议时必填：Cloudflare WS Host/SNI。
# DNS 指向 SERVER_IP 并开启代理，Origin Rules 回源到 PORT_VLESS_WS。
# Required when protocol i is enabled without Argo.
#VLESS_HOST_DOMAIN=''

# WebSocket 路径；默认 <VLESS UUID>-vless / WebSocket path. Default: <VLESS UUID>-vless.
#VLESS_WS_PATH=''


# ==============================================================================
# j. H2 Reality
# ==============================================================================

# 启用 j 协议 / Enable protocol j.
#H2_REALITY='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_H2_REALITY=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_H2_REALITY=''


# ==============================================================================
# k. gRPC Reality
# ==============================================================================

# 启用 k 协议 / Enable protocol k.
#GRPC_REALITY='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_GRPC_REALITY=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
#NODE_NAME_GRPC_REALITY=''


# ==============================================================================
# l. AnyTLS
# ==============================================================================

# 启用 l 协议 / Enable protocol l.
#ANYTLS='true'

# 监听端口；默认 START_PORT + 该协议在选择列表中的位置 / Listen port. Default: START_PORT + protocol position.
#PORT_ANYTLS=''

# 节点名；默认 NODE_NAME_CONFIRM，再回退到默认主机名 / Node name. Falls back to NODE_NAME_CONFIRM, then hostname.
